<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Glowing Branching Flower</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <div class="flower-container" id="flower-container">
      
      <!-- Main Stem that everything grows from -->
      <div class="stem main-stem">
        
        <!-- Main Leaves -->
        <div class="leaf leaf-main-1"></div>
        <div class="leaf leaf-main-2"></div>

        <!-- Main Flower Head -->
        <div class="flower-head main-flower">
          <div class="petal p1"></div><div class="petal p2"></div>
          <div class="petal p3"></div><div class="petal p4"></div>
          <div class="petal p5"></div><div class="petal p6"></div>
          <div class="petal p7"></div><div class="petal p8"></div>
          <div class="petal p9"></div>
        </div>

        <!-- Branch 1 (Bottom Left - Medium Flower) -->
        <div class="branch b-left-1">
          <div class="leaf leaf-branch-left"></div>
          <div class="flower-head b-flower">
            <div class="petal p-s1"></div><div class="petal p-s2"></div>
            <div class="petal p-s3"></div><div class="petal p-s4"></div>
            <div class="petal p-s5"></div>
          </div>
        </div>

        <!-- Branch 2 (Middle Right - Medium Flower) -->
        <div class="branch b-right-1">
          <div class="leaf leaf-branch-right"></div>
          <div class="flower-head b-flower">
            <div class="petal p-s1"></div><div class="petal p-s2"></div>
            <div class="petal p-s3"></div><div class="petal p-s4"></div>
            <div class="petal p-s5"></div>
          </div>
        </div>

        <!-- Branch 3 (Top Left - Small Bud) -->
        <div class="branch b-left-2">
          <div class="flower-head b-bud">
            <div class="petal p-b1"></div><div class="petal p-b2"></div>
            <div class="petal p-b3"></div>
          </div>
        </div>

        <!-- Branch 4 (Top Right - Small Bud) -->
        <div class="branch b-right-2">
          <div class="flower-head b-bud">
            <div class="petal p-b1"></div><div class="petal p-b2"></div>
            <div class="petal p-b3"></div>
          </div>
        </div>

      </div>
      
      <!-- Sparkles -->
      <div class="sparkle s1"></div>
      <div class="sparkle s2"></div>
      <div class="sparkle s3"></div>
      <div class="sparkle s4"></div>
      <div class="sparkle s5"></div>
      <div class="sparkle s6"></div>
      <div class="sparkle s7"></div>
      <div class="sparkle s8"></div>
    </div>

    <div class="text-container">
      <!-- Text before clicking -->
      <div class="intro-text">
        <span class="letter">P</span>
        <span class="letter">U</span>
        <span class="letter">T</span>
        <span class="letter">R</span>
        <span class="letter">I</span>
        <span class="letter">🤍</span>
      </div>
      
      <div class="hidden-text">
        <h1 class="glow-text">Just for you</h1>
        <p class="subtitle">Everything you're facing now won't feel hard forever. You may be tired, but don't ever think about giving up, beautiful woman.</p>
      </div>
      <button id="bloom-btn">Bloom the magic</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
